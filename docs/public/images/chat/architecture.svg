<svg width="800" height="280" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="280" rx="12" fill="#f4f4f5"/>

  <!-- Row 1: Your Backend -->
  <rect x="280" y="20" width="240" height="40" rx="8" fill="#e4e4e7"/>
  <text x="400" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#3f3f46">Your Backend (any LLM)</text>

  <!-- Arrow -->
  <text x="400" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#a1a1aa">streams response</text>

  <!-- Row 2: Stream Adapter -->
  <rect x="240" y="90" width="320" height="40" rx="8" fill="#e4e4e7"/>
  <text x="400" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#3f3f46">Stream Adapter (parses provider format)</text>

  <!-- Arrow -->
  <text x="400" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#a1a1aa">normalized events</text>

  <!-- Row 3: ChatProvider -->
  <rect x="200" y="160" width="400" height="40" rx="8" fill="#d4d4d8"/>
  <text x="400" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#27272a">ChatProvider (messages, threads, streaming)</text>

  <!-- Arrow -->
  <text x="400" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#a1a1aa">React context</text>

  <!-- Row 4: Layout Components -->
  <rect x="120" y="230" width="170" height="36" rx="8" fill="#d4d4d8"/>
  <text x="205" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#27272a">Copilot</text>

  <rect x="315" y="230" width="170" height="36" rx="8" fill="#d4d4d8"/>
  <text x="400" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#27272a">FullScreen</text>

  <rect x="510" y="230" width="170" height="36" rx="8" fill="#d4d4d8"/>
  <text x="595" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#27272a">BottomTray</text>
</svg>
